name: Validate Plugin

on:
  push:
    branches: [main, v3.0]
  pull_request:
    branches: [main, v3.0]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          echo "Checking plugin.json..."
          if ! python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"; then
            echo "plugin.json is not valid JSON"
            exit 1
          fi
          echo "plugin.json is valid"

      - name: Validate marketplace.json
        run: |
          echo "Checking marketplace.json..."
          if ! python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"; then
            echo "marketplace.json is not valid JSON"
            exit 1
          fi
          echo "marketplace.json is valid"

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          MISSING=0
          for f in \
            ".claude-plugin/plugin.json" \
            "README.md" \
            "CHANGELOG.md" \
            "LICENSE" \
            "commands/init.md" \
            "skills/methodology/SKILL.md" \
            "skills/validation-strategies/SKILL.md" \
            "skills/change-request/SKILL.md" \
            "skills/agentify/SKILL.md" \
            "skills/skill-bootstrap/SKILL.md" \
            "templates/modulo/CLAUDE.md" \
            "templates/modulo/PROJECT_SPEC.md" \
            "templates/modulo/PLAN.md" \
            "templates/cartella/CLAUDE.md" \
            "templates/cartella/PROJECT_SPEC.md" \
            "templates/skill-stub/SKILL.md" \
            "docs/MIGRATION_2.1_to_3.0.md"
          do
            if [ ! -f "$f" ]; then
              echo "  Missing: $f"
              MISSING=$((MISSING + 1))
            else
              echo "  OK $f"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "$MISSING required files missing"
            exit 1
          fi
          echo "All required files present"

      - name: Validate skill frontmatter
        run: |
          echo "Checking skill frontmatter..."
          for f in skills/*/SKILL.md; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "  $f: missing YAML frontmatter"
              exit 1
            fi
            if ! grep -q "^name:" "$f"; then
              echo "  $f: missing 'name' in frontmatter"
              exit 1
            fi
            if ! grep -q "^description:" "$f"; then
              echo "  $f: missing 'description' in frontmatter"
              exit 1
            fi
            echo "  OK $f"
          done
          echo "All skills have valid frontmatter"

      - name: Validate command frontmatter
        run: |
          echo "Checking command frontmatter..."
          for f in commands/*.md; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "  $f: missing YAML frontmatter"
              exit 1
            fi
            if ! grep -q "^name:" "$f"; then
              echo "  $f: missing 'name' in frontmatter"
              exit 1
            fi
            echo "  OK $f"
          done
          echo "All commands have valid frontmatter"

      - name: Cross-check plugin.json paths
        run: |
          echo "Checking that all paths in plugin.json exist..."
          python3 - <<'EOF'
          import json, sys, os
          with open('.claude-plugin/plugin.json') as f:
              data = json.load(f)
          missing = []
          # commands: array of paths to .md files
          for p in data.get('commands', []):
              rel = p.lstrip('./')
              if not os.path.isfile(rel):
                  missing.append(('command', p))
          # skills: array of paths to directories containing SKILL.md
          skills = data.get('skills')
          if isinstance(skills, str):
              skills = [skills]
          for p in skills or []:
              rel = p.rstrip('/').lstrip('./')
              if not os.path.isdir(rel):
                  missing.append(('skill-dir', p))
              elif not os.path.isfile(os.path.join(rel, 'SKILL.md')):
                  missing.append(('skill-md', p + 'SKILL.md'))
          if missing:
              print("Issues in plugin.json paths:")
              for kind, m in missing:
                  print(f"  [{kind}] {m}")
              sys.exit(1)
          print("All plugin.json paths exist")
          EOF

      - name: Summary
        run: |
          echo ""
          echo "==========================================="
          echo "  Vibecoding 3.0 Plugin Validation Passed"
          echo "==========================================="
          echo ""
          echo "  Commands: $(ls commands/*.md | wc -l)"
          echo "  Skills:   $(ls skills/*/SKILL.md | wc -l)"
          echo "  Templates:$(find templates -type f | wc -l)"
